name: Deploy Web App

# Trigger: push to main or release branches that change web app, desktop core, or deploy scripts
on:
  push:
    branches: [main, "release/**"]
    paths:
      - "web/**"
      - "mcp_server/**"
      - "desktop/src/**"
      - "desktop/pyproject.toml"
      - "scripts/deploy-app.sh"
      - "scripts/post-deploy-check.sh"
      - "CHANGELOG.md"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: # manual trigger from Actions tab

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-production
  cancel-in-progress: false # never cancel an in-progress deploy

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          install_with_retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            local delay=5
            while true; do
              if "$@"; then
                return 0
              fi
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${attempt} attempts: $*"
                return 1
              fi
              echo "Attempt ${attempt} failed. Retrying in ${delay}s: $*"
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          install_with_retry 4 python -m pip install -e ./desktop
          install_with_retry 4 python -m pip install -e ./web
          install_with_retry 4 python -m pip install -r ./mcp_server/requirements.txt
          install_with_retry 4 python -m pip install -r ./mcp_server/tests/requirements.txt
          install_with_retry 4 python -m pip install pytest

      - name: Install Pandoc
        run: sudo apt-get install -y pandoc

      - name: Verify MCP test dependencies
        run: |
          python -c "import fastapi, starlette, pydantic"

      - name: Run web tests
        run: python -m pytest web/tests/ -x -q

      - name: Run MCP server tests
        run: python -m pytest mcp_server/tests/ -x -q

  deploy:
    name: Deploy to production
    needs: test
    runs-on: ubuntu-latest
    environment: production # requires GitHub environment approval (optional)
    steps:
      - name: Resolve WCAG gate status
        id: wcag_gate
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          line="$(gh api "repos/$REPO/actions/runs?head_sha=$SHA&event=push&per_page=100" --jq '.workflow_runs[] | select(.name=="Accessibility Regression Gate") | [.status,.conclusion] | @tsv' | head -n1 || true)"

          aa_status="not-run"
          if [[ -n "$line" ]]; then
            run_status="$(printf '%s' "$line" | cut -f1)"
            run_conclusion="$(printf '%s' "$line" | cut -f2)"
            if [[ "$run_status" == "completed" ]]; then
              if [[ "$run_conclusion" == "success" ]]; then
                aa_status="passed"
              else
                aa_status="failed"
              fi
            else
              aa_status="in-progress"
            fi
          fi

          echo "wcag22aa=$aa_status" >> "$GITHUB_OUTPUT"
          echo "wcag22aaa=not-configured" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        id: deploy_ssh
        uses: appleboy/ssh-action@v1
        env:
          WCAG22AA_GATE: ${{ steps.wcag_gate.outputs.wcag22aa }}
          WCAG22AAA_GATE: ${{ steps.wcag_gate.outputs.wcag22aaa }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 15m
          envs: WCAG22AA_GATE,WCAG22AAA_GATE
          script: |
            set -e
            echo "=== Starting deploy at $(date -u) ==="
            cd ~/app
            git fetch origin
            # Use the branch that triggered the workflow (main or release/**)
            git reset --hard origin/${{ github.ref_name }}
            bash scripts/deploy-app.sh
            bash scripts/post-deploy-check.sh
            echo "=== Deploy finished at $(date -u) ==="
      - name: Publish deploy troubleshooting summary
        if: always()
        run: |
          {
            echo "## Deploy verification summary"
            echo ""
            echo "- Job status: ${{ job.status }}"
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Remote post-deploy latest log: /home/deploy/deploy-logs/post-deploy-check-latest.log"
            echo "- Remote timestamped logs: /home/deploy/deploy-logs/post-deploy-check-*.log"
            echo ""
            echo "### Troubleshooting"
            echo "- In the Deploy via SSH logs, search for: Diagnostics: pipeline, Diagnostics: web, Diagnostics: ollama"
            echo "- Required health gates: pipeline, web, ollama must all be healthy"
          } >> "$GITHUB_STEP_SUMMARY"
