name: Build Executables

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      upload_release:
        description: "Upload artifacts to GitHub Release"
        type: boolean
        default: false

permissions:
  contents: write           # needed to create releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 -- most common target
          - os: windows-latest
            label: win-x64
            exe: acb-large-print-win-x64.exe
          # Windows ARM64
          - os: windows-11-arm
            label: win-arm64
            exe: acb-large-print-win-arm64.exe
          # macOS Intel
          - os: macos-13
            label: macos-x64
            exe: acb-large-print-macos-x64
          # macOS Apple Silicon
          - os: macos-latest
            label: macos-arm64
            exe: acb-large-print-macos-arm64
          # Linux x64
          - os: ubuntu-latest
            label: linux-x64
            exe: acb-large-print-linux-x64
          # Linux ARM64
          - os: ubuntu-24.04-arm
            label: linux-arm64
            exe: acb-large-print-linux-arm64

    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # wxPython wheels are not available for all platforms on PyPI.
      # Linux needs system GTK libs; macOS/Windows have pre-built wheels.
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev \
            libnotify-dev libsdl2-dev freeglut3-dev

      - name: Install Python dependencies
        working-directory: word-addon
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mammoth>=1.8.0
          pip install pyinstaller>=6.0

      # wxPython ARM64 Linux may need building from source
      - name: Install wxPython (platform-specific)
        working-directory: word-addon
        run: |
          pip install wxPython>=4.2.0 || echo "wxPython wheel not available for this platform -- GUI will not be included"

      - name: Build executable
        working-directory: word-addon
        run: python build.py

      - name: Verify executable exists
        working-directory: word-addon
        run: |
          ls -la dist/
          test -f "dist/${{ matrix.exe }}" || (echo "Expected ${{ matrix.exe }} not found" && exit 1)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: word-addon/dist/${{ matrix.exe }}
          retention-days: 30

  # -- Aggregate all platform builds into one download --
  collect:
    name: Collect all builds
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-builds
          merge-multiple: true

      - name: List builds
        run: ls -lhR all-builds/

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: acb-large-print-all-platforms
          path: all-builds/
          retention-days: 30

  # -- Create GitHub Release when triggered by a tag --
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || inputs.upload_release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lhR release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: false
