name: Build Executables

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      upload_release:
        description: "Upload artifacts to GitHub Release"
        type: boolean
        default: false

permissions:
  contents: write           # needed to create releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 -- most common target
          - os: windows-latest
            label: win-x64
            exe: acb-large-print-win-x64.exe
            shell: pwsh
          # Windows ARM64
          - os: windows-11-arm
            label: win-arm64
            exe: acb-large-print-win-arm64.exe
            shell: pwsh
          # macOS Apple Silicon (M-series)
          - os: macos-latest
            label: macos-arm64
            exe: acb-large-print-macos-arm64
            shell: bash
          # Linux x64
          - os: ubuntu-latest
            label: linux-x64
            exe: acb-large-print-linux-x64
            shell: bash
          # Linux ARM64
          - os: ubuntu-24.04-arm
            label: linux-arm64
            exe: acb-large-print-linux-arm64
            shell: bash

    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Linux needs system GTK libs for wxPython
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libnotify-dev libsdl2-dev freeglut3-dev || true

      - name: Install core Python dependencies
        working-directory: word-addon
        run: |
          python -m pip install --upgrade pip
          pip install python-docx>=1.1.0 mammoth>=1.8.0
          pip install pyinstaller>=6.0

      # wxPython wheels may not exist for all platform/Python combos.
      # The CLI still works without it; only the GUI requires wxPython.
      - name: Install wxPython (best-effort)
        working-directory: word-addon
        continue-on-error: true
        run: |
          pip install wxPython>=4.2.0

      - name: Build executable
        working-directory: word-addon
        run: python build.py

      - name: Verify executable exists (Unix)
        if: runner.os != 'Windows'
        working-directory: word-addon
        run: |
          ls -la dist/
          test -f "dist/${{ matrix.exe }}"

      - name: Verify executable exists (Windows)
        if: runner.os == 'Windows'
        working-directory: word-addon
        run: |
          Get-ChildItem dist/
          if (-not (Test-Path "dist/${{ matrix.exe }}")) { throw "Expected ${{ matrix.exe }} not found" }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: word-addon/dist/${{ matrix.exe }}
          retention-days: 30

  # -- Aggregate all platform builds into one download --
  collect:
    name: Collect all builds
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-builds
          merge-multiple: true

      - name: List builds
        run: ls -lhR all-builds/

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: acb-large-print-all-platforms
          path: all-builds/
          retention-days: 30

  # -- Create GitHub Release when triggered by a tag --
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || inputs.upload_release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lhR release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: false
