name: Build Executables

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      upload_release:
        description: "Upload artifacts to GitHub Release"
        type: boolean
        default: false

permissions:
  contents: write # needed to create releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 (also runs on ARM64 via emulation)
          - os: windows-latest
            label: win-x64
            shell: pwsh
          # macOS Apple Silicon (M-series)
          - os: macos-latest
            label: macos-arm64
            shell: bash

    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        working-directory: desktop
        shell: bash
        run: |
          python -m pip install --upgrade pip

          install_with_retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            local delay=5
            while true; do
              if "$@"; then
                return 0
              fi
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${attempt} attempts: $*"
                return 1
              fi
              echo "Attempt ${attempt} failed. Retrying in ${delay}s: $*"
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          install_with_retry 4 python -m pip install "python-docx>=1.1.0" "mammoth>=1.8.0" "wxPython>=4.2.0"
          install_with_retry 4 python -m pip install "pyinstaller>=6.0"

      - name: Build executables
        working-directory: desktop
        run: python build.py

      - name: List built executables (Unix)
        if: runner.os != 'Windows'
        working-directory: desktop
        run: ls -la dist/

      - name: List built executables (Windows)
        if: runner.os == 'Windows'
        working-directory: desktop
        run: Get-ChildItem dist/

      # Package macOS executables into a .dmg disk image
      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        working-directory: desktop
        run: |
          DMG_DIR=$(mktemp -d)
          cp -R dist/acb-large-print-cli-macos-arm64 "$DMG_DIR/"
          cp -R dist/acb-large-print-macos-arm64 "$DMG_DIR/"
          chmod +x "$DMG_DIR/"acb-large-print*
          hdiutil create -volname "ACB Large Print Tool" \
            -srcfolder "$DMG_DIR" \
            -ov -format UDZO \
            dist/acb-large-print-macos-arm64.dmg
          ls -la dist/*.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: desktop/dist/
          retention-days: 30

  # -- Aggregate all platform builds into one download --
  collect:
    name: Collect all builds
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-builds
          merge-multiple: true

      - name: List builds
        run: ls -lhR all-builds/

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: acb-large-print-all-platforms
          path: all-builds/
          retention-days: 30

  # -- Create GitHub Release when triggered by a tag --
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || inputs.upload_release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lhR release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: false
