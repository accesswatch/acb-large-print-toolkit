name: Docs Quality

on:
  pull_request:
    paths:
      - "docs/**/*.md"
      - "README.md"
      - ".vale.ini"
      - ".vale/**"
      - ".github/workflows/docs-quality.yml"
  push:
    branches: [main]
    paths:
      - "docs/**/*.md"
      - "README.md"
      - ".vale.ini"
      - ".vale/**"
      - ".github/workflows/docs-quality.yml"

jobs:
  vale:
    name: Vale prose lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Vale
        uses: errata-ai/vale-action@v2
        with:
          files: docs README.md

  languagetool:
    name: LanguageTool docs check (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Java runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre

      - name: Install LanguageTool client
        run: python -m pip install --upgrade pip language-tool-python

      - name: Run LanguageTool docs check
        run: python .github/scripts/languagetool_check.py
