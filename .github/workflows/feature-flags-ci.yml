name: Feature Flags CI

on:
  push:
    paths:
      - 'web/**'
      - '.github/workflows/feature-flags-ci.yml'
  pull_request:
    paths:
      - 'web/**'

jobs:
  migrate-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install dependencies (desktop and web dev)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e desktop/
          python -m pip install -e web[dev]

      - name: Run feature flags migration
        run: python web/tools/run_migrate.py

      - name: Run web tests
        run: python -m pytest web/ -q
        env:
          # ensure sqlite backend for audit tests
          FEATURE_FLAGS_BACKEND: sqlite
