services:
  ollama:
    image: ollama/ollama:latest
    expose:
      - "11434"
    environment:
      # Pull models on startup (llama3 for text, llava for vision)
      # Models persist in ollama volume across restarts
      - OLLAMA_MODELS=/root/.ollama/models
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    # Ensure models are pulled on first startup
    entrypoint: /bin/sh -c "ollama pull llama3 && ollama pull llava && ollama serve"

  pipeline:
    image: daisyorg/pipeline:1.15.4
    environment:
      PIPELINE2_WS_HOST: "0.0.0.0"
      PIPELINE2_WS_AUTHENTICATION: "false"
    expose:
      - "8181"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8181'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - FLASK_DEBUG=0
      - PIPELINE_URL=http://pipeline:8181/ws
      # Set FEEDBACK_PASSWORD to enable /feedback/review?key=<password>
      # - FEEDBACK_PASSWORD=change-me-in-production
      # Postmark email notifications (optional -- email reports to users)
      # - POSTMARK_SERVER_TOKEN=your-postmark-server-token
      # - POSTMARK_FROM_EMAIL=reports@glow.bits-acb.org
    volumes:
      - feedback-data:/app/instance
    depends_on:
      pipeline:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  feedback-data:
  ollama-models:
