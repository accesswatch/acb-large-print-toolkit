services:
  pipeline:
    image: daisyorg/pipeline:v1.15.4
    environment:
      PIPELINE2_WS_HOST: "0.0.0.0"
      PIPELINE2_WS_AUTHENTICATION: "false"
    expose:
      - "8181"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/ws/alive"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - FLASK_DEBUG=0
      - PIPELINE_URL=http://pipeline:8181/ws
      # Set FEEDBACK_PASSWORD to enable /feedback/review?key=<password>
      # - FEEDBACK_PASSWORD=change-me-in-production
    volumes:
      - feedback-data:/app/instance
    depends_on:
      pipeline:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  feedback-data:
