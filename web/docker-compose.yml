services:
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --save ""
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  pipeline:
    image: daisyorg/pipeline:1.15.4
    environment:
      PIPELINE2_WS_HOST: "0.0.0.0"
      PIPELINE2_WS_AUTHENTICATION: "false"
    expose:
      - "8181"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8181'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
      args:
        SKIP_SPEECH_MODELS: ${SKIP_SPEECH_MODELS:-0}
    ports:
      - "8000:8000"
    environment:
      - FLASK_DEBUG=0
      - PIPELINE_URL=http://pipeline:8181/ws
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      # Set FEEDBACK_PASSWORD to enable /feedback/review?key=<password>
      # - FEEDBACK_PASSWORD=change-me-in-production
      # Postmark email notifications (optional -- email reports to users)
      # - POSTMARK_SERVER_TOKEN=your-postmark-server-token
      # - POSTMARK_FROM_EMAIL=reports@glow.bits-acb.org
    volumes:
      - feedback-data:/app/instance
      - speech-models:/app/instance/speech_models
    depends_on:
      pipeline:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  keycloak:
    image: jboss/keycloak:latest
    environment:
      KEYCLOAK_ADMIN_PASSWORD: "change-me-in-production"
    expose:
      - "8080"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/realms/master"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  feedback-data:
  speech-models:
  redis-data:
