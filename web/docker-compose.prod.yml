# Production Docker Compose -- Caddy reverse proxy + Flask/Gunicorn + Pipeline
# File: web/docker-compose.prod.yml
#
# Prerequisites:
#   - web/.env file with SECRET_KEY, FEEDBACK_PASSWORD, LOG_LEVEL
#   - web/Caddyfile with your domain configuration
#   - web/www/ directory for the main site static files
#   - desktop/ directory at ../desktop/ (needed for Docker build)
#
# Usage:
#   cd ~/app/web
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  pipeline:
    image: daisyorg/pipeline:1.15.4
    environment:
      PIPELINE2_WS_HOST: "0.0.0.0"
      PIPELINE2_WS_AUTHENTICATION: "false"
    expose:
      - "8181"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "glow-pipeline/{{.Name}}"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8181'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    expose:
      - "8000"
    env_file: .env
    environment:
      - FLASK_DEBUG=0
      - PIPELINE_URL=http://pipeline:8181/ws
      # AI rollout defaults: keep AI disabled in production until each feature
      # has been validated, then override these in web/.env as needed.
      - GLOW_ENABLE_AI=${GLOW_ENABLE_AI:-0}
      - GLOW_ENABLE_AI_CHAT=${GLOW_ENABLE_AI_CHAT:-0}
      - GLOW_ENABLE_AI_WHISPERER=${GLOW_ENABLE_AI_WHISPERER:-0}
      - GLOW_ENABLE_AI_HEADING_FIX=${GLOW_ENABLE_AI_HEADING_FIX:-0}
      - GLOW_ENABLE_AI_ALT_TEXT=${GLOW_ENABLE_AI_ALT_TEXT:-0}
      - GLOW_ENABLE_AI_MARKITDOWN_LLM=${GLOW_ENABLE_AI_MARKITDOWN_LLM:-0}
      # Branding profile: 'bits' (default) or 'uarizona'
      - GLOW_BRAND_PROFILE=${GLOW_BRAND_PROFILE:-bits}
      # Postmark email notifications (optional -- email audit reports to users)
      # Set these in the .env file loaded via env_file above:
      #   POSTMARK_SERVER_TOKEN=your-postmark-server-token
      #   POSTMARK_FROM_EMAIL=reports@glow.bits-acb.org
    volumes:
      - feedback-data:/app/instance
    depends_on:
      pipeline:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
        tag: "glow-web/{{.Name}}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./www:/srv/www:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
        tag: "glow-caddy/{{.Name}}"

volumes:
  feedback-data:
  caddy_data:
  caddy_config:
