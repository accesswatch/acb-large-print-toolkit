# Production Docker Compose -- Caddy reverse proxy + Flask/Gunicorn + Pipeline
# File: web/docker-compose.prod.yml
#
# Prerequisites:
#   - web/.env file with required secrets (see web/.env for template)
#     * SECRET_KEY - Flask session encryption key
#     * FEEDBACK_PASSWORD - Password for /feedback/review dashboard
#     * FEEDBACK_GITHUB_TOKEN - GitHub PAT for feedback-to-issue automation
#     * FEEDBACK_GITHUB_REPO, FEEDBACK_GITHUB_ASSIGNEE, FEEDBACK_GITHUB_LABELS (optional)
#   - web/Caddyfile with your domain configuration
#   - web/www/ directory for the main site static files
#   - desktop/ directory at ../desktop/ (needed for Docker build)
#
# Usage:
#   cd ~/app/web
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --save ""
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
        tag: "glow-redis/{{.Name}}"

  pipeline:
    image: daisyorg/pipeline:1.15.4
    environment:
      PIPELINE2_WS_HOST: "0.0.0.0"
      PIPELINE2_WS_AUTHENTICATION: "false"
    expose:
      - "8181"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "glow-pipeline/{{.Name}}"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8181'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    command:
      [
        "start-dev",
        "--http-relative-path=/auth",
        "--import-realm",
      ]
    environment:
      KEYCLOAK_ADMIN: "admin"
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me-in-production}
      KC_DB: "dev-file"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: "/auth"
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-lp.csedesigns.com}
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: "xforwarded"
      KC_HEALTH_ENABLED: "true"
    expose:
      - "8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./keycloak:/opt/keycloak/data/import:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
        tag: "glow-keycloak/{{.Name}}"

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
      args:
        # Set SKIP_SPEECH_MODELS=1 on air-gapped servers; then place model files
        # manually in the speech-models volume at /app/instance/speech_models/
        SKIP_SPEECH_MODELS: ${SKIP_SPEECH_MODELS:-0}
    expose:
      - "8000"
    env_file: .env
    # env_file loads: SECRET_KEY, FEEDBACK_PASSWORD, FEEDBACK_GITHUB_TOKEN, FEEDBACK_GITHUB_*
    environment:
      - FLASK_DEBUG=0
      - PIPELINE_URL=http://pipeline:8181/ws
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      # AI rollout defaults: Ollama-first setup.
      # Users can bring their own Ollama key from /ai without requiring
      # server-side OpenRouter configuration.
      - GLOW_ENABLE_AI=${GLOW_ENABLE_AI:-1}
      - GLOW_ENABLE_AI_GENERAL_CHAT=${GLOW_ENABLE_AI_GENERAL_CHAT:-1}
      - GLOW_ENABLE_AI_CHAT=${GLOW_ENABLE_AI_CHAT:-0}
      - GLOW_ENABLE_AI_WHISPERER=${GLOW_ENABLE_AI_WHISPERER:-0}
      - GLOW_ENABLE_AI_HEADING_FIX=${GLOW_ENABLE_AI_HEADING_FIX:-1}
      - GLOW_ENABLE_AI_ALT_TEXT=${GLOW_ENABLE_AI_ALT_TEXT:-0}
      - GLOW_ENABLE_AI_MARKITDOWN_LLM=${GLOW_ENABLE_AI_MARKITDOWN_LLM:-1}
      # Branding profile: 'bits' (default) or 'uarizona'
      - GLOW_BRAND_PROFILE=${GLOW_BRAND_PROFILE:-bits}
      # Feedback-to-GitHub sync is enabled when FEEDBACK_GITHUB_TOKEN is set in .env
      # Postmark email notifications (optional -- email audit reports to users)
      # Set these in the .env file loaded via env_file above:
      #   POSTMARK_SERVER_TOKEN=your-postmark-server-token
      #   POSTMARK_FROM_EMAIL=reports@glow.bits-acb.org
    volumes:
      - feedback-data:/app/instance
      - speech-models:/app/instance/speech_models
    depends_on:
      pipeline:
        condition: service_healthy
      redis:
        condition: service_started
      keycloak:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
        tag: "glow-web/{{.Name}}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  mcp:
    build:
      context: ..
      dockerfile: mcp_server/Dockerfile
    expose:
      - "8000"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
        tag: "glow-mcp/{{.Name}}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./www:/srv/www:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
      mcp:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
        tag: "glow-caddy/{{.Name}}"

  worker:
    build:
      context: ..
      dockerfile: web/Dockerfile
      args:
        SKIP_SPEECH_MODELS: ${SKIP_SPEECH_MODELS:-0}
    command: celery -A acb_large_print_web.tasks worker --loglevel=INFO --concurrency=2
    env_file: .env
    environment:
      - FLASK_DEBUG=0
      - PIPELINE_URL=http://pipeline:8181/ws
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    volumes:
      - feedback-data:/app/instance
      - speech-models:/app/instance/speech_models
    depends_on:
      pipeline:
        condition: service_healthy
      redis:
        condition: service_started
      keycloak:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
        tag: "glow-worker/{{.Name}}"

volumes:
  feedback-data:
  speech-models:
  redis-data:
  caddy_data:
  caddy_config:
  keycloak-data:
