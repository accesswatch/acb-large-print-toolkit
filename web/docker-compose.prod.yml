# Production Docker Compose -- Caddy reverse proxy + Flask/Gunicorn + Pipeline
# File: web/docker-compose.prod.yml
#
# Prerequisites:
#   - web/.env file with SECRET_KEY, FEEDBACK_PASSWORD, LOG_LEVEL
#   - web/Caddyfile with your domain configuration
#   - web/www/ directory for the main site static files
#   - desktop/ directory at ../desktop/ (needed for Docker build)
#
# Usage:
#   cd ~/app/web
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  pipeline:
    image: daisyorg/pipeline:1.15.4
    environment:
      PIPELINE2_WS_HOST: "0.0.0.0"
      PIPELINE2_WS_AUTHENTICATION: "false"
    expose:
      - "8181"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8181'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    expose:
      - "8000"
    env_file: .env
    environment:
      - FLASK_DEBUG=0
      - PIPELINE_URL=http://pipeline:8181/ws
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - feedback-data:/app/instance
    depends_on:
      pipeline:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./www:/srv/www:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy

volumes:
  feedback-data:
  caddy_data:
  caddy_config:
  ollama_data:
