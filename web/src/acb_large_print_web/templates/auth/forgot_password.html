{% extends "base.html" %}
{% block title %}Reset Password - GLOW{% endblock %}
{% block content %}
<section class="card">
  <h1 id="forgot-title">Reset Password</h1>
  {% if sent %}
  <p>If an account exists for that email, a reset link has been sent.</p>
  {% else %}
  <form method="post" action="{{ url_for('auth.forgot_password') }}" class="stack-gap">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required autocomplete="email">
    <button type="submit" class="button button--primary">Send reset link</button>
  </form>
  {% endif %}
</section>
{% endblock %}
