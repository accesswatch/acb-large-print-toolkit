{% extends "base.html" %}
{% block title %}Set New Password - GLOW{% endblock %}
{% block content %}
<section class="card" aria-labelledby="reset-title">
  <h1 id="reset-title">Set New Password</h1>
  {% if error %}<p class="error-text">{{ error }}</p>{% endif %}
  <form method="post" action="{{ url_for('auth.reset_password', token=token) }}" class="stack-gap">
    <label for="password">New password</label>
    <input id="password" name="password" type="password" required autocomplete="new-password">
    <label for="confirm_password">Confirm new password</label>
    <input id="confirm_password" name="confirm_password" type="password" required autocomplete="new-password">
    <button type="submit" class="button button--primary">Update password</button>
  </form>
</section>
{% endblock %}
