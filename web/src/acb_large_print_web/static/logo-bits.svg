<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" role="img" aria-label="BITS – Blind Information Technology Solutions">
  <title>BITS – Blind Information Technology Solutions</title>
  <!-- Background pill -->
  <rect width="220" height="48" rx="6" fill="#1a3a5c"/>
  <!-- Braille-dot decorative accent -->
  <circle cx="14" cy="14" r="3.5" fill="#5ba3d0"/>
  <circle cx="14" cy="24" r="3.5" fill="#5ba3d0"/>
  <circle cx="14" cy="34" r="3.5" fill="#5ba3d0"/>
  <circle cx="22" cy="14" r="3.5" fill="#5ba3d0" opacity="0.5"/>
  <circle cx="22" cy="24" r="3.5" fill="#5ba3d0"/>
  <circle cx="22" cy="34" r="3.5" fill="#5ba3d0" opacity="0.5"/>
  <!-- BITS wordmark -->
  <text x="36" y="31" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" letter-spacing="2">BITS</text>
  <!-- Subtitle -->
  <text x="90" y="23" font-family="Arial,Helvetica,sans-serif" font-size="8.5" fill="#a8d4f0" letter-spacing="0.5">BLIND INFORMATION</text>
  <text x="90" y="35" font-family="Arial,Helvetica,sans-serif" font-size="8.5" fill="#a8d4f0" letter-spacing="0.5">TECHNOLOGY SOLUTIONS</text>
</svg>
